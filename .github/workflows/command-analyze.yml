name: Command - Analyze Bundle

on:
  # PR/issue comments only; excludes edits and deletions
  issue_comment:
    types: [created]
  # Allows manual trigger for testing on GitHub Actions CI
  workflow_dispatch:
    inputs: {}

jobs:
  setup:
    # Allow if:
    # - Manually triggered (workflow_dispatch), or
    # - Comment is "/analyze" on a PR, posted by the PR author
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.comment.body == '/analyze' &&
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == github.event.issue.user.login)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      sha: ${{ steps.set-commit-sha.outputs.sha }}
      cache-hit: ${{ steps.restore-analyze-cache.outputs.cache-hit }}

    steps:
      # workflow_dispatch: use github.sha (the selected branch)
      # issue_comment: github.sha points to main, so fetch the PR head SHA via API
      - name: Set commit SHA
        id: set-commit-sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            SHA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.sha')
            echo "sha=$SHA" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Restore cache; if cache-hit the build job will be skipped entirely
      - name: Restore analyze cache
        id: restore-analyze-cache
        uses: actions/cache/restore@v4
        with:
          path: analyze.client.${{ steps.set-commit-sha.outputs.sha }}.json
          key: analyze-${{ steps.set-commit-sha.outputs.sha }}

  build:
    needs: setup
    if: needs.setup.outputs.cache-hit != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.7

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run nuxt analyze; outputs analyze.client.<sha>.json
      # COMMIT_SHA: used by the script to name the output file
      # NITRO_PRESET: ensures build config matches production
      - name: Run analyze
        run: pnpm run analyze:ci
        env:
          COMMIT_SHA: ${{ needs.setup.outputs.sha }}
          NITRO_PRESET: cloudflare-pages

      # Save analyze.client.<sha>.json to GitHub Actions Cache
      # key: analyze-<sha> — reusable by other workflows with the same key
      - name: Cache analyze result
        uses: actions/cache/save@v4
        with:
          path: analyze.client.${{ needs.setup.outputs.sha }}.json
          key: analyze-${{ needs.setup.outputs.sha }}

  report:
    needs: [setup, build]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore analyze cache
        uses: actions/cache/restore@v4
        with:
          path: analyze.client.${{ needs.setup.outputs.sha }}.json
          key: analyze-${{ needs.setup.outputs.sha }}

      # Run bundle-report.ts; tee writes stdout to both CI log and bundle-report.txt
      - name: Generate bundle report text
        run: |
          node --experimental-strip-types scripts/bundle-report.ts \
            analyze.client.${{ needs.setup.outputs.sha }}.json \
            | tee bundle-report.txt

      # Only post a PR comment for issue_comment events; workflow_dispatch: check CI log
      - name: Comment result on PR
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const report = fs.readFileSync('bundle-report.txt', 'utf8')
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Bundle Report (\`${{ needs.setup.outputs.sha }}\`)\n\`\`\`\n${report}\n\`\`\``
            })
